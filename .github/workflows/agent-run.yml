name: Autonomous Agent Run

on:
  schedule:
    # Runs once daily at 06:00 UTC. The agent decides per AGENT.md whether
    # there's meaningful work to do each run; an uneventful run is fine.
    - cron: "0 6 * * *"
  workflow_dispatch: {}
    # Lets you manually trigger a run from the GitHub Actions tab —
    # use this for the first supervised dry run before trusting the cron.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: stackverify-agent
  cancel-in-progress: false
  # Prevents two runs overlapping if a manual trigger and the cron
  # schedule ever collide.

jobs:
  agent-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Hard wall-clock ceiling. If a run is still going after 30 minutes,
    # something's wrong (stuck loop, runaway tool calls) — kill it rather
    # than let it run indefinitely.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read AGENT.md and agent/log.md in full before doing anything else.
            Decide the highest-leverage next action toward the 30-day goal
            described in AGENT.md, given the current state of the repo and
            your journal history.

            IMPORTANT — commit early and often, don't save it all for the
            end. If the task is large, break it into the smallest sensible
            increment that's a complete, working improvement on its own,
            commit that, then continue with further increments if you have
            turns remaining. Never treat "do the whole task" as one atomic
            block where nothing is saved until everything is finished — you
            have a limited number of turns and may run out before reaching
            a final commit if you work that way.

            Before you do anything else, as your first or second action,
            commit a trivial checkpoint if needed to confirm git is working,
            then proceed with real work, committing after each meaningful
            chunk.

            When you're done (or running low on turns), append an entry to
            agent/log.md describing what you found, what you decided, what
            you actually committed, and what the next run should know. Do
            this BEFORE you run out of turns — leave yourself enough turn
            budget at all times to at minimum update the journal, even if
            the code work isn't finished. An unfinished task with a clear
            journal entry is fine; finished code with no journal entry and
            no commit is the failure mode to avoid.

            If there's nothing meaningful to do this run, say so in the
            journal and stop — don't make busywork changes just to have
            something to commit.
          claude_args: >-
            --max-turns 60
            --model claude-sonnet-4-6
            --allowedTools "Read,Edit,Write,Bash(git:*),Bash(npm:*),Bash(node:*)"

      - name: Verify site still builds
        run: |
          npm ci
          npm run build
        # If the agent's changes broke the build, fail loudly here rather
        # than letting a broken commit sit on main silently. Vercel will
        # also fail its own build on a bad commit, but this catches it
        # within the same job for a clearer audit trail.